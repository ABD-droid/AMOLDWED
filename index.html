<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amol & Komal - Wedding Invitation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="weddingAudio1" src="invitation1.mp3"></audio>
    <audio id="weddingAudio2" src="invitation2.mp3"></audio>

    <div class="env-wrapper" id="envelope-wrapper">
        <div class="envelope" id="envelope">
            <div class="flap"></div>
            <div class="pocket"></div>
            
            <div class="letter">
                <img src="couple.jpeg" alt="Amol and Komal" class="couple-img">
                <h1 class="names">अमोल <span>व</span> कोमल</h1>
                <p class="date">१९ जून २०२६</p>
                <p class="message">आमच्या विवाह सोहळ्यास आपली उपस्थिती प्रार्थनीय आहे.</p>
            </div>
        </div>
        <p class="instruction-text">💌 क्लिक करा</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
